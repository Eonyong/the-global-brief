<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 | 시그널 앤 스토리</title>
    <script id="blog-theme-init">
      (function () {
        var key = "blog-theme";
        var root = document.documentElement;
        var stored = "";
        try { stored = localStorage.getItem(key) || ""; } catch (e) {}
        var theme = (stored === "light" || stored === "dark")
          ? stored
          : ((window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light");
        root.setAttribute("data-theme", theme);
      })();
    </script>
    <style>
      :root {
        --bg: #f3f6fb;
        --surface: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --line: #d5deea;
        --primary: #1d4ed8;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 8%, rgba(37, 99, 235, 0.14), rgba(37, 99, 235, 0) 36%),
          linear-gradient(180deg, #f9fbff, var(--bg));
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
      }
      .card {
        width: min(560px, 96vw);
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--surface);
        padding: 1.2rem;
      }
      h1 { margin: 0.2rem 0 0; font-size: 1.45rem; }
      .code {
        display: inline-block;
        font-weight: 800;
        color: var(--primary);
        font-size: 0.92rem;
      }
      p { margin: 0.65rem 0 0; color: var(--muted); line-height: 1.6; }
      .actions { margin-top: 1rem; display: flex; gap: 0.55rem; flex-wrap: wrap; }
      .btn {
        display: inline-block;
        text-decoration: none;
        font-weight: 700;
        border-radius: 10px;
        padding: 0.62rem 0.82rem;
      }
      .btn.primary { background: var(--primary); color: #fff; }
      .btn.ghost { border: 1px solid var(--line); color: var(--text); }
    </style>
    <style id="blog-theme-style">
      html { color-scheme: light; }
      html[data-theme="light"] { color-scheme: light; }
      html[data-theme="dark"] { color-scheme: dark; }
      html[data-theme="light"] {
        --bg: #f3f6fb;
        --surface: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --line: #d5deea;
        --primary: #1d4ed8;
      }
      html[data-theme="dark"] {
        --bg: #0b0f14;
        --surface: #121824;
        --text: #e8eef6;
        --muted: #aab6c5;
        --line: #263246;
        --primary: #6aa6ff;
      }
      html[data-theme="dark"] body {
        background:
          radial-gradient(circle at 10% 8%, rgba(106, 166, 255, 0.14), rgba(106, 166, 255, 0) 36%),
          linear-gradient(180deg, #0f1520, var(--bg));
      }
      .theme-toggle-fab {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 9999;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
        padding: 0.5rem 0.75rem;
        border-radius: 999px;
        font-size: 0.82rem;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="code">404 NOT FOUND</span>
      <h1>요청하신 페이지를 찾을 수 없습니다.</h1>
      <p>주소가 변경되었거나 삭제되었을 수 있습니다. 아래 링크로 이동해 주세요.</p>
      <div class="actions">
        <a class="btn primary" href="/">메인으로 이동</a>
        <a class="btn ghost" href="/briefings.html">브리핑 목록</a>
      </div>
    </main>
    <script id="blog-theme-toggle-script">
      (function () {
        var key = "blog-theme";
        var root = document.documentElement;
        function currentTheme() {
          var t = root.getAttribute("data-theme");
          return (t === "light" || t === "dark") ? t : "light";
        }
        function setTheme(next) {
          root.setAttribute("data-theme", next);
          try { localStorage.setItem(key, next); } catch (e) {}
          updateLabel();
        }
        function updateLabel() {
          var btn = document.querySelector("[data-theme-toggle]");
          if (!btn) return;
          btn.textContent = currentTheme() === "dark" ? "라이트 모드" : "다크 모드";
        }
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "theme-toggle-fab";
        btn.setAttribute("data-theme-toggle", "1");
        btn.setAttribute("aria-label", "테마 전환");
        document.body.appendChild(btn);
        updateLabel();
        btn.addEventListener("click", function () {
          setTheme(currentTheme() === "dark" ? "light" : "dark");
        });
      })();
    </script>
  </body>
</html>
